apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pete-bot

resources:
  - ../../base

# Use labels with includeSelectors: false to avoid breaking external services
labels:
  - pairs:
      environment: prod
    includeSelectors: false

images:
  - name: docker.toastedbytes.com/pete-bot
    newTag: latest
